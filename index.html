<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>옥천전씨 모산파 역사만화</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1008;
      color: #f0e6d3;
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 24px 16px 12px;
    }
    header h1 {
      font-size: 1.5rem;
      color: #d4a843;
      letter-spacing: 0.1em;
    }
    header p {
      font-size: 0.85rem;
      color: #a08060;
      margin-top: 4px;
    }

    #book-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
      width: 100%;
      max-width: 1200px;
    }

    .nav-btn {
      background: #3a2010;
      border: 2px solid #d4a843;
      color: #d4a843;
      font-size: 2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      user-select: none;
    }
    .nav-btn:hover { background: #5a3520; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #book {
      display: flex;
      gap: 0;
      background: #2a1808;
      border: 3px solid #6a4020;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      position: relative;
    }

    .page-slot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #f5f0e8;
      overflow-y: auto;
    }

    #book::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 6px;
      background: linear-gradient(to right, #3a2010, #6a4020, #3a2010);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }
    #book.single-page::after { display: none; }

    .page-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .page-slot.empty { background: #e8e0d0; }

    /* ── HTML 텍스트 페이지 스타일 ── */
    .text-page {
      width: 100%;
      min-height: 100%;
      padding: 28px 24px;
      background: #f5f0e8;
      color: #2a1808;
      font-family: 'Noto Serif KR', Georgia, serif;
    }
    .text-page h2 {
      font-size: 1.15rem;
      color: #6a2010;
      text-align: center;
      border-bottom: 2px solid #c4943a;
      padding-bottom: 10px;
      margin-bottom: 18px;
      letter-spacing: 0.08em;
    }
    .text-page h3 {
      font-size: 0.95rem;
      color: #5a3010;
      margin: 14px 0 6px;
      border-left: 3px solid #c4943a;
      padding-left: 8px;
    }
    .text-page p {
      font-size: 0.82rem;
      line-height: 1.75;
      color: #3a2010;
      margin-bottom: 8px;
    }
    .text-page .source-tag {
      display: inline-block;
      font-size: 0.68rem;
      background: #c4943a;
      color: #fff;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .text-page .oral-tag {
      display: inline-block;
      font-size: 0.68rem;
      background: #7a5030;
      color: #f0e6d3;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .text-page .divider {
      border: none;
      border-top: 1px dashed #c4943a;
      margin: 14px 0;
    }
    .text-page .person-card {
      background: #ede5d0;
      border: 1px solid #c4943a;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .text-page .person-name {
      font-size: 1rem;
      font-weight: bold;
      color: #6a2010;
    }
    .text-page .person-year {
      font-size: 0.75rem;
      color: #8a6040;
      margin-left: 8px;
    }
    .text-page .message-box {
      background: #2a1808;
      color: #d4a843;
      text-align: center;
      padding: 12px;
      border-radius: 4px;
      font-size: 0.88rem;
      margin-top: 16px;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* 가계도 스타일 */
    .tree-wrap { padding: 4px 0; }
    .tree-node {
      display: flex;
      align-items: center;
      margin: 4px 0;
    }
    .tree-indent { width: 20px; flex-shrink: 0; }
    .tree-line { color: #c4943a; font-size: 1rem; margin-right: 4px; }
    .tree-label {
      font-size: 0.78rem;
      background: #ede5d0;
      border: 1px solid #c4943a;
      border-radius: 4px;
      padding: 3px 8px;
      color: #3a2010;
      line-height: 1.4;
    }
    .tree-label.highlight {
      background: #c4943a;
      color: #fff;
      font-weight: bold;
    }
    .tree-label.oral {
      border-color: #9a7050;
      background: #e8dcc8;
      color: #6a4020;
    }
    .tree-connector {
      font-size: 0.7rem;
      color: #9a7050;
      margin-left: 6px;
    }

    #page-info {
      text-align: center;
      padding: 12px;
      color: #a08060;
      font-size: 0.9rem;
    }
    #page-title { color: #d4a843; font-size: 1rem; margin-bottom: 4px; }

    #hint {
      font-size: 0.78rem;
      color: #6a5040;
      text-align: center;
      padding-bottom: 20px;
    }

    #thumbnails {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 16px 16px;
      max-width: 1200px;
      width: 100%;
    }
    #thumbnails::-webkit-scrollbar { height: 6px; }
    #thumbnails::-webkit-scrollbar-track { background: #1a1008; }
    #thumbnails::-webkit-scrollbar-thumb { background: #6a4020; border-radius: 3px; }

    .thumb {
      flex-shrink: 0;
      width: 60px;
      height: 80px;
      border: 2px solid #3a2010;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb:hover { opacity: 0.9; }
    .thumb.active { border-color: #d4a843; opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-text {
      width: 100%;
      height: 100%;
      background: #ede5d0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: #6a2010;
      text-align: center;
      padding: 4px;
      line-height: 1.3;
      font-family: serif;
    }

    @media (max-width: 768px) {
      #book-container { gap: 6px; padding: 8px; }
      .nav-btn { width: 36px; height: 36px; font-size: 1.4rem; }
      #book { flex-direction: column; }
      #book::after { display: none; }
      #right-page { display: none !important; }
      .page-slot { min-height: unset; }
      #hint { display: none; }
      .thumb { width: 44px; height: 58px; }
    }
  </style>
</head>
<body>

<header>
  <h1>옥천전씨 모산파 역사만화</h1>
</header>

<div id="book-container">
  <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">&#8249;</button>
  <div id="book">
    <div class="page-slot" id="left-page"></div>
    <div class="page-slot" id="right-page"></div>
  </div>
  <button class="nav-btn" id="next-btn" onclick="changePage(1)">&#8250;</button>
</div>

<div id="page-info">
  <div id="page-title"></div>
  <div id="page-num"></div>
</div>

<div id="thumbnails"></div>

<div id="hint">← → 방향키 또는 버튼으로 넘기기 &nbsp;|&nbsp; 아래 그림 클릭으로 바로 이동</div>

  /* ── 슬롯 렌더 헬퍼 ── */
  function renderSlot(slot, page) {
    if (!page) {
      slot.innerHTML = '';
      slot.className = 'page-slot empty';
      slot.style.display = 'none';
      return;
    }
    slot.style.display = '';
    if (page.type === 'html') {
      slot.innerHTML = page.html;
      slot.className = 'page-slot';
      slot.style.overflowY = 'auto';
    } else {
      slot.innerHTML = `<img src="${page.src}" alt="${page.label}">`;
      slot.className = 'page-slot';
      slot.style.overflowY = '';
    }
  }

  /* ── 데스크탑: 2페이지 펼침 ── */
  const portraitPage = { src: '전유_관성군.jpg', label: '전유 관성군' };
  function getSpreadPages(spread) {
    if (spread === 0) return [portraitPage, pages[0]];
    const l = 2 * spread - 1, r = 2 * spread;
    return [l < pages.length ? pages[l] : null, r < pages.length ? pages[r] : null];
  }
  const totalSpreads = Math.ceil((pages.length - 1) / 2) + 1;

  let currentSpread = 0;
  let currentPage   = 0;

  function render() {
    const leftSlot  = document.getElementById('left-page');
    const rightSlot = document.getElementById('right-page');

    if (isMobile()) {
      rightSlot.style.display = 'none';
      leftSlot.style.display  = '';
      const p = pages[currentPage];
      if (p.type === 'html') {
        leftSlot.innerHTML = p.html;
        leftSlot.className = 'page-slot';
        leftSlot.style.overflowY = 'auto';
      } else {
        leftSlot.innerHTML = `<img src="${p.src}" alt="${p.label}" style="width:100%;height:auto;display:block;">`;
        leftSlot.className = 'page-slot';
        leftSlot.style.overflowY = '';
      }

      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage >= pages.length - 1;
      document.getElementById('page-title').textContent = p.label;
      document.getElementById('page-num').textContent   = `${currentPage + 1} / ${pages.length}`;

      document.querySelectorAll('.thumb').forEach((el, i) => {
        el.classList.toggle('active', i === currentPage);
        if (i === currentPage) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });

    } else {
      const [left, right] = getSpreadPages(currentSpread);
      renderSlot(leftSlot,  left);
      renderSlot(rightSlot, right);
      document.getElementById('book').classList.toggle('single-page', !left || !right);

      document.getElementById('prev-btn').disabled = currentSpread === 0;
      document.getElementById('next-btn').disabled = currentSpread >= totalSpreads - 1;
      const ll = left  ? left.label  : '';
      const rl = right ? right.label : '';
      document.getElementById('page-title').textContent = ll && rl ? `${ll} · ${rl}` : (rl || ll);
      document.getElementById('page-num').textContent   = `${currentSpread + 1} / ${totalSpreads}`;

      document.querySelectorAll('.thumb').forEach((el, i) => {
        el.classList.toggle('active', i === currentSpread);
        if (i === currentSpread) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }
  }

  function changePage(dir) {
    if (isMobile()) {
      currentPage = Math.max(0, Math.min(pages.length - 1, currentPage + dir));
    } else {
      currentSpread = Math.max(0, Math.min(totalSpreads - 1, currentSpread + dir));
    }
    render();
  }

  /* ── 썸네일 생성 ── */
  function thumbInner(page) {
    if (!page) return '';
    if (page.type === 'html') return `<div class="thumb-text">${page.label}</div>`;
    return `<img src="${page.src}" alt="${page.label}">`;
  }

  function buildThumbnails() {
    const bar = document.getElementById('thumbnails');
    bar.innerHTML = '';
    if (isMobile()) {
      pages.forEach((p, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.title = p.label;
        thumb.innerHTML = thumbInner(p);
        thumb.addEventListener('click', () => { currentPage = i; render(); });
        bar.appendChild(thumb);
      });
    } else {
      for (let i = 0; i < totalSpreads; i++) {
        const [left, right] = getSpreadPages(i);
        const display = right || left;
        const label   = !left ? right.label : !right ? left.label : `${left.label}·${right.label}`;
        const thumb   = document.createElement('div');
        thumb.className = 'thumb';
        thumb.title = label;
        thumb.innerHTML = thumbInner(display);
        thumb.addEventListener('click', () => { currentSpread = i; render(); });
        bar.appendChild(thumb);
      }
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  changePage(-1);
    if (e.key === 'ArrowRight') changePage(1);
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) changePage(dx < 0 ? 1 : -1);
  });

  /* 만화 원본 비율(1055×1491)에 맞게 슬롯 높이 고정 */
  const PAGE_RATIO = 1491 / 1055;
  function fixSlotHeight() {
    const book = document.getElementById('book');
    const numSlots = isMobile() ? 1 : 2;
    const slotWidth = book.offsetWidth / numSlots;
    const h = Math.round(slotWidth * PAGE_RATIO);
    document.querySelectorAll('.page-slot').forEach(slot => {
      slot.style.height    = h + 'px';
      slot.style.maxHeight = h + 'px';
    });
  }

  window.addEventListener('resize', () => { fixSlotHeight(); buildThumbnails(); render(); });

  fixSlotHeight();
  buildThumbnails();
  render();
</script>
</body>
</html>
