<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>옥천전씨 모산파 역사만화</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1008;
      color: #f0e6d3;
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 24px 16px 12px;
    }
    header h1 {
      font-size: 1.5rem;
      color: #d4a843;
      letter-spacing: 0.1em;
    }
    header p {
      font-size: 0.85rem;
      color: #a08060;
      margin-top: 4px;
    }

    /* 책 컨테이너 */
    #book-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
      width: 100%;
      max-width: 1200px;
    }

    .nav-btn {
      background: #3a2010;
      border: 2px solid #d4a843;
      color: #d4a843;
      font-size: 2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      user-select: none;
    }
    .nav-btn:hover { background: #5a3520; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* 책 펼침 영역 */
    #book {
      display: flex;
      gap: 0;
      background: #2a1808;
      border: 3px solid #6a4020;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
    }

    .page-slot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      position: relative;
      background: #f5f0e8;
    }

    /* 책 가운데 바인딩 선 */
    #book::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 6px;
      background: linear-gradient(to right, #3a2010, #6a4020, #3a2010);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }
    #book { position: relative; }

    .page-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .page-slot.empty {
      background: #e8e0d0;
    }
    .page-slot.empty::after {
      content: '';
    }

    /* 표지 페이지 (혼자 전체 너비) */
    #book.cover-mode .page-slot {
      flex: 1;
    }
    #book.cover-mode .page-slot.hidden {
      display: none;
    }

    /* 페이지 번호 표시 */
    #page-info {
      text-align: center;
      padding: 12px;
      color: #a08060;
      font-size: 0.9rem;
    }

    #page-title {
      color: #d4a843;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    /* 키보드 힌트 */
    #hint {
      font-size: 0.78rem;
      color: #6a5040;
      text-align: center;
      padding-bottom: 20px;
    }

    /* 썸네일 바 */
    #thumbnails {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 16px 16px;
      max-width: 1200px;
      width: 100%;
    }
    #thumbnails::-webkit-scrollbar { height: 6px; }
    #thumbnails::-webkit-scrollbar-track { background: #1a1008; }
    #thumbnails::-webkit-scrollbar-thumb { background: #6a4020; border-radius: 3px; }

    .thumb {
      flex-shrink: 0;
      width: 60px;
      height: 80px;
      border: 2px solid #3a2010;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb:hover { opacity: 0.9; }
    .thumb.active { border-color: #d4a843; opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* 모바일: 세로 1페이지씩 */
    @media (max-width: 700px) {
      #book-container { gap: 6px; padding: 8px; }
      .nav-btn { width: 36px; height: 36px; font-size: 1.4rem; }
      #book { flex-direction: column; }
      #right-page { display: none; }
      .page-slot { min-height: 300px; }
      #hint { display: none; }
      .thumb { width: 44px; height: 58px; }
    }
  </style>
</head>
<body>

<header>
  <h1>옥천전씨 모산파 역사만화</h1>
</header>

<div id="book-container">
  <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">&#8249;</button>

  <div id="book">
    <div class="page-slot" id="left-page"></div>
    <div class="page-slot" id="right-page"></div>
  </div>

  <button class="nav-btn" id="next-btn" onclick="changePage(1)">&#8250;</button>
</div>

<div id="page-info">
  <div id="page-title"></div>
  <div id="page-num"></div>
</div>

<div id="thumbnails"></div>

<div id="hint">← → 방향키 또는 버튼으로 넘기기 &nbsp;|&nbsp; 아래 그림 클릭으로 바로 이동</div>

<script>
  // 페이지 순서: 표지 → 만화 0~14
  const pages = [
    { src: '표지_모산파.png', label: '표지' },
    { src: '옥천전씨모산파역사만화0.png', label: '1화' },
    { src: '옥천전씨모산파역사만화1.png', label: '2화' },
    { src: '옥천전씨모산파역사만화2.png', label: '3화' },
    { src: '옥천전씨모산파역사만화3.png', label: '4화' },
    { src: '옥천전씨모산파역사만화4.png', label: '5화' },
    { src: '옥천전씨모산파역사만화5.png', label: '6화' },
    { src: '옥천전씨모산파역사만화6.png', label: '7화' },
    { src: '옥천전씨모산파역사만화7.png', label: '8화' },
    { src: '옥천전씨모산파역사만화8.png', label: '9화' },
    { src: '옥천전씨모산파역사만화9.png', label: '10화' },
    { src: '옥천전씨모산파역사만화10.png', label: '11화' },
    { src: '옥천전씨모산파역사만화11.png', label: '12화' },
    { src: '옥천전씨모산파역사만화12.png', label: '13화' },
    { src: '옥천전씨모산파역사만화13.png', label: '14화' },
    { src: '옥천전씨모산파역사만화14.png', label: '15화' },
  ];

  // 책 펼침: 짝수 인덱스가 왼쪽, 홀수가 오른쪽
  // 0(표지)는 오른쪽 한 장만
  let currentSpread = 0; // 0 = 표지, 1 = 1~2화, 2 = 3~4화 ...

  // spread → 실제 페이지 인덱스 계산
  // spread 0: 표지(0) 단독
  // spread 1: pages[1], pages[2]
  // spread n(n>=1): pages[2n-1], pages[2n]
  function getSpreadPages(spread) {
    if (spread === 0) return [null, pages[0]]; // 표지는 오른쪽
    const left = 2 * spread - 1;
    const right = 2 * spread;
    return [
      left < pages.length ? pages[left] : null,
      right < pages.length ? pages[right] : null,
    ];
  }

  const totalSpreads = Math.ceil((pages.length - 1) / 2) + 1; // +1 for cover

  function render() {
    const [left, right] = getSpreadPages(currentSpread);
    const leftSlot = document.getElementById('left-page');
    const rightSlot = document.getElementById('right-page');
    const book = document.getElementById('book');

    // 왼쪽 페이지
    if (left) {
      leftSlot.innerHTML = `<img src="${left.src}" alt="${left.label}">`;
      leftSlot.className = 'page-slot';
    } else {
      leftSlot.innerHTML = '';
      leftSlot.className = 'page-slot empty';
    }

    // 오른쪽 페이지
    if (right) {
      rightSlot.innerHTML = `<img src="${right.src}" alt="${right.label}">`;
      rightSlot.className = 'page-slot';
    } else {
      rightSlot.innerHTML = '';
      rightSlot.className = 'page-slot empty';
    }

    // 버튼 상태
    document.getElementById('prev-btn').disabled = currentSpread === 0;
    document.getElementById('next-btn').disabled = currentSpread >= totalSpreads - 1;

    // 페이지 정보
    const leftLabel = left ? left.label : '';
    const rightLabel = right ? right.label : '';
    const labelText = leftLabel && rightLabel ? `${leftLabel} · ${rightLabel}` : (rightLabel || leftLabel);
    document.getElementById('page-title').textContent = labelText;
    document.getElementById('page-num').textContent = `${currentSpread + 1} / ${totalSpreads}`;

    // 썸네일 활성화
    document.querySelectorAll('.thumb').forEach((el, i) => {
      // spread에 속하는 페이지 인덱스
      const [l, r] = getSpreadPages(i);
      const isActive = i === currentSpread;
      el.classList.toggle('active', isActive);
      if (isActive) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  }

  function changePage(dir) {
    currentSpread = Math.max(0, Math.min(totalSpreads - 1, currentSpread + dir));
    render();
  }

  // 썸네일 생성
  function buildThumbnails() {
    const bar = document.getElementById('thumbnails');
    for (let i = 0; i < totalSpreads; i++) {
      const [left, right] = getSpreadPages(i);
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.title = (() => {
        if (!left) return right.label;
        if (!right) return left.label;
        return `${left.label} · ${right.label}`;
      })();
      const img = document.createElement('img');
      img.src = right ? right.src : left.src;
      img.alt = thumb.title;
      thumb.appendChild(img);
      thumb.addEventListener('click', () => { currentSpread = i; render(); });
      bar.appendChild(thumb);
    }
  }

  // 키보드
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') changePage(-1);
    if (e.key === 'ArrowRight') changePage(1);
  });

  // 터치 스와이프
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) changePage(dx < 0 ? 1 : -1);
  });

  buildThumbnails();
  render();
</script>
</body>
</html>
