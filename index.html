<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>옥천전씨 모산파 역사만화</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1008;
      color: #f0e6d3;
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 24px 16px 12px;
    }
    header h1 {
      font-size: 1.5rem;
      color: #d4a843;
      letter-spacing: 0.1em;
    }
    header p {
      font-size: 0.85rem;
      color: #a08060;
      margin-top: 4px;
    }

    #book-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
      width: 100%;
      max-width: 1200px;
    }

    .nav-btn {
      background: #3a2010;
      border: 2px solid #d4a843;
      color: #d4a843;
      font-size: 2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      user-select: none;
    }
    .nav-btn:hover { background: #5a3520; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #book {
      display: flex;
      gap: 0;
      background: #2a1808;
      border: 3px solid #6a4020;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      position: relative;
    }

    .page-slot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #f5f0e8;
      overflow-y: auto;
    }

    #book::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 6px;
      background: linear-gradient(to right, #3a2010, #6a4020, #3a2010);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }
    #book.single-page::after { display: none; }

    .page-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .page-slot.empty { background: #e8e0d0; }

    /* ── HTML 텍스트 페이지 스타일 ── */
    .text-page {
      width: 100%;
      height: 100%;
      padding: 10px 12px;
      background: #f5f0e8;
      color: #2a1808;
      font-family: 'Noto Serif KR', Georgia, serif;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .text-page h2 {
      font-size: 0.82rem;
      color: #6a2010;
      text-align: center;
      border-bottom: 1.5px solid #c4943a;
      padding-bottom: 5px;
      margin-bottom: 7px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .text-page h3 {
      font-size: 0.75rem;
      color: #5a3010;
      margin: 6px 0 3px;
      border-left: 2px solid #c4943a;
      padding-left: 5px;
    }
    .text-page p {
      font-size: 0.68rem;
      line-height: 1.5;
      color: #3a2010;
      margin-bottom: 4px;
    }
    .text-page .source-tag {
      display: inline-block;
      font-size: 0.58rem;
      background: #c4943a;
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: 3px;
      vertical-align: middle;
    }
    .text-page .oral-tag {
      display: inline-block;
      font-size: 0.58rem;
      background: #7a5030;
      color: #f0e6d3;
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: 3px;
      vertical-align: middle;
    }
    .text-page .divider {
      border: none;
      border-top: 1px dashed #c4943a;
      margin: 5px 0;
      flex-shrink: 0;
    }
    .text-page .person-card {
      background: #ede5d0;
      border: 1px solid #c4943a;
      border-radius: 4px;
      padding: 5px 8px;
      margin-bottom: 5px;
      flex-shrink: 0;
    }
    .text-page .person-name {
      font-size: 0.78rem;
      font-weight: bold;
      color: #6a2010;
    }
    .text-page .person-year {
      font-size: 0.62rem;
      color: #8a6040;
      margin-left: 5px;
    }
    .text-page .message-box {
      background: #2a1808;
      color: #d4a843;
      text-align: center;
      padding: 6px 8px;
      border-radius: 3px;
      font-size: 0.7rem;
      margin-top: auto;
      font-style: italic;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* 가계도 스타일 */
    .tree-wrap { padding: 2px 0; flex: 1; }
    .tree-node {
      display: flex;
      align-items: center;
      margin: 2px 0;
    }
    .tree-indent { width: 14px; flex-shrink: 0; }
    .tree-line { color: #c4943a; font-size: 0.8rem; margin-right: 3px; }
    .tree-label {
      font-size: 0.66rem;
      background: #ede5d0;
      border: 1px solid #c4943a;
      border-radius: 3px;
      padding: 2px 6px;
      color: #3a2010;
      line-height: 1.3;
    }
    .tree-label.highlight {
      background: #c4943a;
      color: #fff;
      font-weight: bold;
    }
    .tree-label.oral {
      border-color: #9a7050;
      background: #e8dcc8;
      color: #6a4020;
    }
    .tree-connector {
      font-size: 0.6rem;
      color: #9a7050;
      margin-left: 4px;
    }

    /* 항렬 가로 행 */
    .항렬-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin: 6px 0 4px;
      flex-shrink: 0;
    }
    .항렬-box {
      font-size: 0.64rem;
      background: #ede5d0;
      border: 1px solid #c4943a;
      border-radius: 3px;
      padding: 2px 6px;
      color: #3a2010;
    }
    .항렬-box.highlight {
      background: #c4943a;
      color: #fff;
      font-weight: bold;
    }
    .항렬-arrow { font-size: 0.7rem; color: #c4943a; }

    #page-info {
      text-align: center;
      padding: 12px;
      color: #a08060;
      font-size: 0.9rem;
    }
    #page-title { color: #d4a843; font-size: 1rem; margin-bottom: 4px; }

    #hint {
      font-size: 0.78rem;
      color: #6a5040;
      text-align: center;
      padding-bottom: 20px;
    }

    #thumbnails {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 16px 16px;
      max-width: 1200px;
      width: 100%;
    }
    #thumbnails::-webkit-scrollbar { height: 6px; }
    #thumbnails::-webkit-scrollbar-track { background: #1a1008; }
    #thumbnails::-webkit-scrollbar-thumb { background: #6a4020; border-radius: 3px; }

    .thumb {
      flex-shrink: 0;
      width: 60px;
      height: 80px;
      border: 2px solid #3a2010;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb:hover { opacity: 0.9; }
    .thumb.active { border-color: #d4a843; opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-text {
      width: 100%;
      height: 100%;
      background: #ede5d0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: #6a2010;
      text-align: center;
      padding: 4px;
      line-height: 1.3;
      font-family: serif;
    }

    @media (max-width: 768px) {
      #book-container { gap: 6px; padding: 8px; }
      .nav-btn { width: 36px; height: 36px; font-size: 1.4rem; }
      #book { flex-direction: column; }
      #book::after { display: none; }
      #right-page { display: none !important; }
      .page-slot { min-height: unset; }
      #hint { display: none; }
      .thumb { width: 44px; height: 58px; }
    }
  </style>
</head>
<body>

<header>
  <h1>옥천전씨 모산파 역사만화</h1>
</header>

<div id="book-container">
  <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">&#8249;</button>
  <div id="book">
    <div class="page-slot" id="left-page"></div>
    <div class="page-slot" id="right-page"></div>
  </div>
  <button class="nav-btn" id="next-btn" onclick="changePage(1)">&#8250;</button>
</div>

<div id="page-info">
  <div id="page-title"></div>
  <div id="page-num"></div>
</div>

<div id="thumbnails"></div>

<div id="hint">← → 방향키 또는 버튼으로 넘기기 &nbsp;|&nbsp; 아래 그림 클릭으로 바로 이동</div>

  <h2>조선의 세 가지 충(忠)</h2>
  <p style="text-align:center; font-size:0.62rem; color:#8a6040; margin-bottom:6px;">
    전서공파 계통 <span class="source-tag">한국민족문화대백과</span>
  </p>

  <div class="person-card">
    <div><span class="person-name">전희철(全希哲)</span><span class="person-year">1425~1521</span></div>
    <p style="margin-top:3px;">단종 폐위 후 벼슬을 버리고 낙향. 영주 칠성루에서 여생을 마치며 절의(節義)를 지켰습니다.</p>
    <p style="font-size:0.62rem; color:#7a5030; font-style:italic; margin-top:2px;">"뜻을 굽히지 않는 것도 충이다"</p>
  </div>

  <div class="person-card">
    <div><span class="person-name">전팽령(全彭齡)</span><span class="person-year">1480~1560 · 호: 송정(松亭)</span></div>
    <p style="margin-top:3px;">1524년 별시문과 급제, 상주목사 재임 시 청렴한 치정으로 <strong>청백리(廉謹)</strong>에 선발되었습니다.</p>
    <p style="font-size:0.62rem; color:#7a5030; font-style:italic; margin-top:2px;">"가장 가난한 목사가 가장 존경받았다"</p>
  </div>

  <div class="person-card">
    <div><span class="person-name">전식(全湜)</span><span class="person-year">1563~1642 · 호: 사서(沙西)</span></div>
    <p style="margin-top:3px;">유성룡·장현광의 문인. 임진왜란 때 <strong>의병을 일으켰으며</strong> 이후 대사헌을 역임. 문집·영정·신도비 현존.</p>
    <p style="font-size:0.62rem; color:#7a5030; font-style:italic; margin-top:2px;">"나라가 흔들릴 때 전씨는 일어섰다"</p>
  </div>

  <div class="message-box">각자의 방식으로 — 그러나 같은 뿌리에서</div>
</div>`;

  /* ── 페이지 목록 ── */
  const pages = [
    { src: '표지_모산파.png',              label: '표지' },
    { type: 'html', html: HTML_가계도,     label: '가계도' },
    { src: '옥천전씨모산파역사만화1.png',  label: '1화' },
    { src: '옥천전씨모산파역사만화2.png',  label: '2화' },
    { src: '옥천전씨모산파역사만화3.png',  label: '3화' },
    { type: 'html', html: HTML_비석,       label: '비석' },
    { src: '옥천전씨모산파역사만화4.png',  label: '4화' },
    { src: '옥천전씨모산파역사만화5.png',  label: '5화' },
    { src: '옥천전씨모산파역사만화6.png',  label: '6화' },
    { src: '옥천전씨모산파역사만화7.png',  label: '7화' },
    { src: '옥천전씨모산파역사만화8.png',  label: '8화' },
    { type: 'html', html: HTML_조선인물,   label: '인물' },
    { src: '옥천전씨모산파역사만화9.png',  label: '9화' },
    { src: '옥천전씨모산파역사만화10.png', label: '10화' },
    { src: '옥천전씨모산파역사만화11.png', label: '11화' },
    { type: 'html', html: HTML_소금길,      label: '소금길' },
    { src: '옥천전씨모산파역사만화12.png', label: '12화' },
    { src: '옥천전씨모산파역사만화13.png', label: '13화' },
    { type: 'html', html: HTML_파파실사람들, label: '파파실 사람들' },
    { src: '옥천전씨모산파역사만화14.png', label: '14화' },
  ];

  function isMobile() { return window.innerWidth <= 768; }

  /* ── 슬롯 렌더 헬퍼 ── */
  function renderSlot(slot, page) {
    if (!page) {
      slot.innerHTML = '';
      slot.className = 'page-slot empty';
      slot.style.display = 'none';
      return;
    }
    slot.style.display = '';
    if (page.type === 'html') {
      slot.innerHTML = page.html;
      slot.className = 'page-slot';
      slot.style.overflowY = 'auto';
    } else {
      slot.innerHTML = `<img src="${page.src}" alt="${page.label}">`;
      slot.className = 'page-slot';
      slot.style.overflowY = '';
    }
  }

  /* ── 데스크탑: 2페이지 펼침 ── */
  const portraitPage = { src: '전유_관성군.jpg', label: '전유 관성군' };
  function getSpreadPages(spread) {
    if (spread === 0) return [portraitPage, pages[0]];
    const l = 2 * spread - 1, r = 2 * spread;
    return [l < pages.length ? pages[l] : null, r < pages.length ? pages[r] : null];
  }
  const totalSpreads = Math.ceil((pages.length - 1) / 2) + 1;

  let currentSpread = 0;
  let currentPage   = 0;

  function render() {
    const leftSlot  = document.getElementById('left-page');
    const rightSlot = document.getElementById('right-page');

    if (isMobile()) {
      rightSlot.style.display = 'none';
      leftSlot.style.display  = '';
      const p = pages[currentPage];
      if (p.type === 'html') {
        leftSlot.innerHTML = p.html;
        leftSlot.className = 'page-slot';
        leftSlot.style.overflowY = 'auto';
      } else {
        leftSlot.innerHTML = `<img src="${p.src}" alt="${p.label}" style="width:100%;height:100%;object-fit:contain;display:block;">`;
        leftSlot.className = 'page-slot';
        leftSlot.style.overflowY = '';
      }

      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage >= pages.length - 1;
      document.getElementById('page-title').textContent = p.label;
      document.getElementById('page-num').textContent   = `${currentPage + 1} / ${pages.length}`;

      document.querySelectorAll('.thumb').forEach((el, i) => {
        el.classList.toggle('active', i === currentPage);
        if (i === currentPage) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });

    } else {
      const [left, right] = getSpreadPages(currentSpread);
      renderSlot(leftSlot,  left);
      renderSlot(rightSlot, right);
      document.getElementById('book').classList.toggle('single-page', !left || !right);

      document.getElementById('prev-btn').disabled = currentSpread === 0;
      document.getElementById('next-btn').disabled = currentSpread >= totalSpreads - 1;
      const ll = left  ? left.label  : '';
      const rl = right ? right.label : '';
      document.getElementById('page-title').textContent = ll && rl ? `${ll} · ${rl}` : (rl || ll);
      document.getElementById('page-num').textContent   = `${currentSpread + 1} / ${totalSpreads}`;

      document.querySelectorAll('.thumb').forEach((el, i) => {
        el.classList.toggle('active', i === currentSpread);
        if (i === currentSpread) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }
  }

  function changePage(dir) {
    if (isMobile()) {
      currentPage = Math.max(0, Math.min(pages.length - 1, currentPage + dir));
    } else {
      currentSpread = Math.max(0, Math.min(totalSpreads - 1, currentSpread + dir));
    }
    fixSlotHeight();
    render();
  }

  /* ── 썸네일 생성 ── */
  function thumbInner(page) {
    if (!page) return '';
    if (page.type === 'html') return `<div class="thumb-text">${page.label}</div>`;
    return `<img src="${page.src}" alt="${page.label}">`;
  }

  function buildThumbnails() {
    const bar = document.getElementById('thumbnails');
    bar.innerHTML = '';
    if (isMobile()) {
      pages.forEach((p, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.title = p.label;
        thumb.innerHTML = thumbInner(p);
        thumb.addEventListener('click', () => { currentPage = i; render(); });
        bar.appendChild(thumb);
      });
    } else {
      for (let i = 0; i < totalSpreads; i++) {
        const [left, right] = getSpreadPages(i);
        const display = right || left;
        const label   = !left ? right.label : !right ? left.label : `${left.label}·${right.label}`;
        const thumb   = document.createElement('div');
        thumb.className = 'thumb';
        thumb.title = label;
        thumb.innerHTML = thumbInner(display);
        thumb.addEventListener('click', () => { currentSpread = i; render(); });
        bar.appendChild(thumb);
      }
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  changePage(-1);
    if (e.key === 'ArrowRight') changePage(1);
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) changePage(dx < 0 ? 1 : -1);
  });

  /* 만화 원본 비율(1055×1491)에 맞게 슬롯 높이 고정 */
  const PAGE_RATIO = 1491 / 1055;
  function fixSlotHeight() {
    const book = document.getElementById('book');
    const numSlots = isMobile() ? 1 : 2;
    const slotWidth = book.offsetWidth / numSlots;
    const h = Math.round(slotWidth * PAGE_RATIO);
    document.querySelectorAll('.page-slot').forEach(slot => {
      slot.style.height    = h + 'px';
      slot.style.maxHeight = h + 'px';
    });
  }

  window.addEventListener('resize', () => { fixSlotHeight(); buildThumbnails(); render(); });

  fixSlotHeight();
  buildThumbnails();
  render();
</script>
</body>
</html>
